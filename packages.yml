#!/usr/bin/env ansible-playbook
---
- name: Setup_my_favorite_packages
  hosts: rhel_hosts fedora_hosts

  tasks:
    - name: RPM_fusion_keys
      ansible.builtin.rpm_key:
        state: present
        key: "{{ item }}"
      loop:
        - https://rpmfusion.org/keys?action=AttachFile&do=get&target=RPM-GPG-KEY-rpmfusion-free-fedora-2020
        - https://rpmfusion.org/keys?action=AttachFile&do=get&target=RPM-GPG-KEY-rpmfusion-nonfree-fedora-2020
      when: ansible_distribution == 'Fedora'

    - name: RPM_fusion_repo
      ansible.builtin.dnf:
        state: present
        name:
          - https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm
          - https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm
      when: ansible_distribution == 'Fedora'

    - name: Useful_packages
      ansible.builtin.dnf:
        name:
          - bash-completion
          - pciutils
          - unzip
          - vim
          - wget
          - numactl
          - sos
          - iotop
          - procps-ng
          - net-tools
          - nmap
          - tcpdump
          - traceroute
  #        - wireshark - loads X!
          - bind-utils # for dig
          - rsync
  #        - ntpdate
          - lsof
  #        - libselinux-python # needed for lots of ansible scripts
          - tree
          - dstat
          - tracer-common
          - podman
          - buildah
          - skopeo
          - tuned
          - lshw
          - sysstat
          - nmstate
          - lm_sensors
          - cmake
          - clean-rpm-gpg-pubkey
          - guestfs-tools
          - httpd-tools

    - name: RHEL8_packages
      ansible.builtin.dnf:
        name:
          - ansible-core
      when: ansible_distribution == 'RedHat' and ansible_distribution_major_version | int >= 8

    - name: Pre_rhel8_packages
      ansible.builtin.dnf:
        name:
          - ansible
          - atop
          - iftop
          - nethogs
          - rpmconf
      when: ansible_distribution == 'Fedora' or (ansible_distribution == 'RedHat' and ansible_distribution_major_version | int < 8)

    - name: Tracer_package_dnf
      ansible.builtin.dnf:
        name:
          - python3-dnf-plugin-tracer
      when: ansible_distribution == 'Fedora'

    # yamllint disable rule:command-instead-of-module
    - name: Get_repos
      ansible.builtin.command:
        cmd: dnf repolist --enabled
      register: repolist
      changed_when: false
      # args:
      #   warn: false

    - name: Packages_if_epel
      ansible.builtin.dnf:
        name:
          - tracer
      when:
        - repolist.stdout.find("epel/x86_64") != -1
        - ansible_distribution == 'RedHat'

    - name: Packages_if_fedora
      ansible.builtin.dnf:
        name:
          - dnf-plugin-system-upgrade
          - remove-retired-packages
          - rpmfusion-free-release-tainted
          - cpu-x
          - linux-system-roles
      when: ansible_distribution == 'Fedora'

    - name: Copy_top_config
      ansible.builtin.copy:
        src: toprc
        dest: /root/.toprc
        mode: a+rw

    - name: Signal_repo # deprecated as of 8.5.0 - https://build.opensuse.org/project/show/network:im:signal
      ansible.builtin.yum_repository:
        name: network_im_signal
        state: absent
      when:
        - "'desktops' in group_names"
        - ansible_distribution == 'Fedora'

    - name: Desktop_packages
      ansible.builtin.dnf:
        name:
          - network-manager-applet
          - baobab
          - hexchat
          - filezilla
          - krb5-auth-dialog
          - krb5-workstation
          - google-android-emoji-fonts
          - google-noto-emoji-color-fonts
          - google-noto-emoji-fonts
          - gimp
          - rpm-build
          - virt-manager
          - tito # git->rpm packager
          - vlc
          - libaacs
          - libbluray
          - libbluray-bdj
          - libbdplus
          - libreoffice
          - kde-connect
          - virt-viewer
          - youtube-dl
          - yt-dlp # youtube-dl fork
          - java-latest-openjdk
          - pylint
          - pandoc # convert text formats
          - k3b
          - g++
          - ImageMagick
          - mkvtoolnix-gui
          - mkvtoolnix
          - snapd
          - ansible-lint
          - evtest # input event test - find key codes
          - obs-studio
          - redhat-display-fonts
          - redhat-text-fonts
          - helm
          - postgresql
          - wireshark
      when: "'desktops' in group_names"

    - name: Veracrypt_keys
      ansible.builtin.rpm_key:
        state: present
        key: https://amcrypto.jp/VeraCrypt/VeraCrypt_PGP_public_key.asc
      when: ansible_distribution == 'Fedora'

    - name: Veracrypt
      ansible.builtin.dnf:
        name:
          - https://launchpad.net/veracrypt/trunk/1.26.24/+download/veracrypt-1.26.24-Fedora-40-x86_64.rpm
      when: "'desktops' in group_names"

    - name: KDEconnect_firewall
      ansible.posix.firewalld:
        service: kdeconnect
        state: enabled
        permanent: true
        immediate: true

- name: Flatpak
  import_playbook: flatpak.yml
  when: "'desktops' in group_names"

- name: Rambox
  import_playbook: rambox.yml
  when: "'desktops' in group_names"

- name: VScode
  import_playbook: vscode.yml
  when: "'desktops' in group_names"

- name: Spotify
  import_playbook: spotify.yml
  when: "'desktops' in group_names"

- name: Git
  import_playbook: git.yml

- name: Xsos
  import_playbook: xsos.yml
  when: "'servers' not in group_names"

- name: Omg
  import_playbook: omg.yml
  when: "'servers' not in group_names"
...
